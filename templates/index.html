<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Cream Sales Predictor Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container-fluid d-flex justify-content-center align-items-center min-vh-100">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h1 class="display-4">🍦 Ice Cream Sales Predictor</h1>
                    <p class="lead text-muted">AI-powered sales forecasting</p>
                </div>
                <form id="predict-form">
                    <div class="mb-3">
                        <label for="temperature" class="form-label">Enter Temperature (°C)</label>
                        <input type="number" class="form-control" id="temperature" name="temperature" placeholder="e.g., 25" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Predict Sales</button>
                </form>
                <div id="result" class="mt-4 text-center" style="display: none;">
                    <div class="alert alert-success">
                        <h5>Predicted Sales: ₹<span id="prediction"></span></h5>
                    </div>
                </div>
                <div id="loading" class="mt-4 text-center" style="display: none;">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2">Predicting...</p>
                </div>
                <div class="mt-4 text-center text-muted">
                    <small>Model Accuracy: R² = 0.98</small>
                </div>
                <div class="mt-4">
                    <h5 class="text-center">Sample Data Visualization</h5>
                    <canvas id="salesChart" width="400" height="200"></canvas>
                </div>
            </div>
        </div>
    </div>
    <footer class="text-center mt-5 text-muted">
        <small>Built with Flask & Machine Learning</small>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
